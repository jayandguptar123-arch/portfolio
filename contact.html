<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Guptar Jayand</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<header class="main-header">
    <a href="index.html" class="logo">Guptar J<span>.</span></a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="work.html">Work</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<main class="wrapper">
    <section class="contact-section">
        
        <div class="section-header">
            <span class="sub-heading">Get In Touch</span>
            <h2>Let's Build Something</h2>
            <div class="underline"></div>
            <p class="contact-desc">
                Have an interesting project, a job opportunity, or just want to say hello? 
                Drop me a message below, and I'll get back to you as soon as possible.
            </p>
        </div>

        <!-- Form container -->
        <div class="contact-container">
            <form class="contact-form" action="#" method="POST">
                <div class="input-group">
                    <input type="text" id="name" name="name" placeholder="Your Name" required aria-label="Your Name">
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder="Your Email" required aria-label="Your Email">
                </div>

                <div class="input-group">
                    <textarea id="message" name="message" rows="6" placeholder="Your Message" required aria-label="Your Message"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Send Message <i class="fa-regular fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </section>
</main>

    <footer class="main-footer">
        <p>&copy; 2026 Guptar Jayand. Built with passion.</p>
    </footer>
    
</body>
</html>
